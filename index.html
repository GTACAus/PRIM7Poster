<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GTAC Scientific Poster Template</title>

<!-- FIGTREE FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#d7e7f0;
    font-family:'Figtree', sans-serif;
    color:#111;
}

.poster{
    width:1000px;
    margin:0 auto;
    padding:30px 20px 50px;
}

/* =====================================================
TITLE
===================================================== */

.title-wrapper{
    display:flex;
    justify-content:center;
    margin-bottom:40px;
}

.title-btn{
    position:relative;
    width:960px;
    height:90px;
    border:none;
    border-radius:32px;
    background:#ffd500;
    font-family:'Figtree', sans-serif;
    font-size:26px;
    font-weight:800;
    cursor:pointer;
    box-shadow:12px 12px 0 #000;
    transition:.2s;
}

.title-btn:hover{
    transform:translateY(-3px);
}

/* =====================================================
SECTIONS
===================================================== */

.row{
    display:flex;
    gap:28px;
    margin-bottom:28px;
}

.panel{
    position:relative;
    background:#f7f5f2;
    border:3px solid #111;
    border-radius:4px;
    padding:80px 30px 30px;
}

/* section label tabs */

.section-label{
    position:absolute;
    top:-26px;
    left:18px;
    min-width:260px;
    padding:14px 34px;
    border-radius:999px;
    font-size:20px;
    background:#ff6b3d;
    border:2px solid #111;
}

.blue-label{
    background:#2dc6ff;
}

.pink-label{
    background:#e78bb8;
}

.purple-label{
    background:#b6a0ef;
}

.green-label{
    background:#4bc95f;
}

/* =====================================================
COLUMN SIZES
===================================================== */

.left-col{
    width:48%;
}

.right-col{
    width:48%;
}

.variables{
    width:48%;
    height:320px;
}

.observations{
    width:48%;
    height:320px;
}

.bottom-panel{
    width:100%;
    padding-top:90px;
}

/* =====================================================
SHAPES
===================================================== */

.shape-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:35px;
    flex-wrap:wrap;
}

/* BUTTON RESET */

.shape-btn{
    border:none;
    cursor:pointer;
    font-family:'Figtree', sans-serif;
    font-weight:800;
    transition:.2s;
    color:#111;
}

.shape-btn:hover{
    transform:scale(1.04);
}

/* =====================================================
ORANGE SHAPES
===================================================== */
.orange-shape,
.purple-shape{
    width:220px;
    height:120px;
    border-radius:20px;

    font-size:18px;
    line-height:1.3;

    padding:20px;
}

.orange-shape{
    background:#ff6b3d;
    color:#111;
}

.purple-shape{
    background:#4d37ff;
    color:white;
}

/* =====================================================
VARIABLE SHAPE
===================================================== */

.variable-shape{
    width:220px;
    height:90px;
    background:#b6a0ef;
    border-radius:20px;
    font-size:20px;
    padding:20px;
}

/* =====================================================
PINK HEXAGON
===================================================== */

.hexagon{
    width:220px;
    height:120px;
    background:#ea93bc;

    clip-path:none;

    border-radius:20px;

    font-size:20px;
    padding:20px;
}

/* =====================================================
GREEN HEXAGONS
===================================================== */

.green-hex{
    width:220px;
    height:120px;
    background:#08c56f;
    color:#111;

    clip-path:none;

    border-radius:20px;

    font-size:18px;
    padding:20px;
}

.green-circle{
    width:220px;
    height:120px;
    background:#08c56f;
    border-radius:20px;
    font-size:18px;
    padding:20px;
}

/* =====================================================
MODAL
===================================================== */

.modal{
    display:none;
    position:fixed;
    z-index:9999;
    inset:0;
    background:rgba(0,0,0,.7);
}

.modal-content{
    position:relative;
    width:85%;
    height:85%;
    background:white;
    margin:3% auto;
    border-radius:18px;
    overflow:hidden;
}

.close{
    position:absolute;
    right:20px;
    top:10px;
    z-index:10;
    font-size:40px;
    cursor:pointer;
    font-weight:700;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

/* image inside modal */
#popup-image{
    width:100%;
    height:100%;
    object-fit:contain;
    display:none;
    background:#fff;
}

/* =====================================================
TEXT
===================================================== */

.center{
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

</style>
</head>
<body>

<div class="poster">

    <!-- TITLE -->
    <div class="title-wrapper">
        <button class="title-btn"
        onclick="openImageModal('Student - Question.png')">
            WRITE AN INVESTIGATION QUESTION
        </button>
    </div>

    <!-- TOP ROW -->
    <div class="row">

        <!-- LEFT -->
        <div class="panel left-col">

            <div class="section-label">
                Background information
            </div>

            <div class="shape-wrap">

                <button class="shape-btn orange-shape center"
                onclick="openImageModal('Student - Writing an Introduction.png')">
                    WRITING AN<br>INTRODUCTION
                </button>

                <button class="shape-btn orange-shape center"
                onclick="openImageModal('Student - Writing a Prediction.png')">
                    MAKING A<br>PREDICTION
                </button>

            </div>

        </div>

        <!-- RIGHT -->
        <div class="panel right-col">

            <div class="section-label blue-label">
                Tables and Graphs
            </div>

            <div class="shape-wrap">

                <button class="shape-btn purple-shape center"
                onclick="openImageModal('Student - Constructing Tables.png')">
                    CONSTRUCTING<br>TABLES
                </button>

                <button class="shape-btn purple-shape center"
                onclick="openImageModal('Student - Constructing Graphs.png')">
                    CONSTRUCTING<br>GRAPHS
                </button>

            </div>

        </div>

    </div>

    <!-- MIDDLE ROW -->
    <div class="row">

        <!-- VARIABLES -->
        <div class="panel variables">

            <div class="section-label purple-label">
                Experimental design
            </div>

            <div class="shape-wrap">

                <button class="shape-btn variable-shape center"
                onclick="openImageModal('Student - Draw a Diagram.png')">
                    DRAW A<br>DIAGRAM
                </button>

                <button class="shape-btn variable-shape center"
                onclick="openImageModal('Student - Variables.png')">
                    WHAT ARE<br>VARIABLES?
                </button>

            </div>

        </div>

        <!-- OBSERVATIONS -->
        <div class="panel observations">

            <div class="section-label pink-label">
                Our observations
            </div>

            <div class="shape-wrap">

                <button class="shape-btn hexagon center"
                onclick="openImageModal('Student - How to Summarise Results.png')">
                    HOW TO<br>SUMMARISE<br>RESULTS
                </button>

            </div>

        </div>

    </div>

    <!-- BOTTOM -->
    <div class="panel bottom-panel">

        <div class="section-label green-label">
            What we learned from further research:
        </div>

        <div class="shape-wrap">

            <button class="shape-btn green-hex center"
            onclick="openImageModal('Student - How to Research.png')">
                HOW TO<br>RESEARCH
            </button>

            <button class="shape-btn green-circle center"
            onclick="openImageModal('Student - Connecting Research.png')">
                CONNECTING<br>RESEARCH
            </button>

            <button class="shape-btn green-hex center"
            onclick="openImageModal('Student - What Next.png')">
                WHAT<br>NEXT?
            </button>

        </div>

    </div>

</div>

<!-- =====================================================
MODAL POPUP
===================================================== -->

<div id="modal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeModal()">
            &times;
        </span>

        <iframe id="popup-frame"></iframe>
        <img id="popup-image" alt="">

    </div>

</div>

<script>

/* open modal showing an HTML page in an iframe (kept for future use) */
function openModal(page){

    document.getElementById("modal").style.display = "block";

    document.getElementById("popup-frame").style.display = "block";
    document.getElementById("popup-frame").src = page;

    document.getElementById("popup-image").style.display = "none";
    document.getElementById("popup-image").src = "";

}

/* open modal showing an image */
function openImageModal(imageSrc){

    document.getElementById("modal").style.display = "block";

    document.getElementById("popup-image").style.display = "block";
    document.getElementById("popup-image").src = imageSrc;

    document.getElementById("popup-frame").style.display = "none";
    document.getElementById("popup-frame").src = "";

}

function closeModal(){

    document.getElementById("modal").style.display = "none";

    document.getElementById("popup-frame").src = "";
    document.getElementById("popup-image").src = "";

}

/* close if clicking outside */

window.onclick = function(event){

    const modal = document.getElementById("modal");

    if(event.target == modal){

        closeModal();

    }
}

</script>

</body>
</html>
