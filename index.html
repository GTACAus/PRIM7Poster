<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GTAC Science Inquiry Poster</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{ box-sizing:border-box; }

body{
    margin:0;
    background:#d7e7f0;
    font-family:'Figtree', sans-serif;
    color:#111;
}

/* =====================================================
LOGO BUTTON
===================================================== */

.logo-btn{
    position:fixed;
    top:14px;
    right:16px;
    z-index:500;
    background:none;
    border:none;
    cursor:pointer;
    padding:0;
    transition:.2s;
}
.logo-btn:hover{ transform:scale(1.06); }
.logo-btn img{
    height:clamp(36px, 5vw, 54px);
    display:block;
}

/* =====================================================
INSTRUCTIONS SIDEBAR
===================================================== */

.sidebar{
    position:fixed;
    right:0;
    top:50%;
    transform:translateY(-50%);
    z-index:400;
    display:flex;
    flex-direction:row;
    align-items:stretch;
}

.sidebar-drawer{
    background:#fff9d6;
    border:2px solid #111;
    border-right:none;
    border-radius:16px 0 0 16px;
    display:flex;
    flex-direction:column;
    gap:10px;
    box-shadow:-6px 6px 0 #111;
    width:0;
    overflow:hidden;
    padding:0;
    opacity:0;
    transition: width .35s cubic-bezier(.4,0,.2,1),
                opacity .25s ease,
                padding .35s cubic-bezier(.4,0,.2,1);
}

.sidebar.open .sidebar-drawer{
    width:clamp(150px, 18vw, 190px);
    opacity:1;
    padding:16px 14px 16px 16px;
}

.sidebar-tab{
    writing-mode:vertical-rl;
    text-orientation:mixed;
    transform:rotate(180deg);
    background:#ffd500;
    border:2px solid #111;
    border-right:none;
    border-radius:0 0 14px 14px;
    padding:18px 10px;
    font-family:'Figtree', sans-serif;
    font-size:clamp(12px, 1.4vw, 15px);
    font-weight:800;
    letter-spacing:.08em;
    cursor:pointer;
    color:#111;
    box-shadow:-4px 4px 0 #111;
    user-select:none;
    flex-shrink:0;
    transition:.2s;
    display:flex;
    align-items:center;
    gap:8px;
}
.sidebar-tab:hover{ background:#ffe94d; }

.sidebar-tab .tab-arrow{
    display:inline-block;
    font-size:11px;
    transition:transform .35s;
}
.sidebar.open .sidebar-tab .tab-arrow{
    transform:rotate(180deg);
}

.sidebar-btn{
    background:#ffd500;
    border:2px solid #111;
    border-radius:10px;
    font-family:'Figtree', sans-serif;
    font-size:clamp(11px, 1.2vw, 13px);
    font-weight:700;
    padding:9px 12px;
    cursor:pointer;
    text-align:left;
    line-height:1.3;
    width:100%;
    white-space:normal;
    transition:.15s;
    box-shadow:3px 3px 0 #111;
    flex-shrink:0;
}
.sidebar-btn:hover{
    transform:translateX(-3px);
    background:#ffe94d;
}

/* =====================================================
POSTER WRAPPER
===================================================== */

.poster{
    width:min(1000px, 96vw);
    margin:0 auto;
    padding:clamp(16px, 3vw, 30px) clamp(10px, 2vw, 20px) clamp(30px, 5vw, 50px);
}

/* =====================================================
TITLE
===================================================== */

.title-wrapper{
    display:flex;
    justify-content:center;
    margin-bottom:clamp(24px, 4vw, 40px);
}

.title-btn{
    width:100%;
    height:clamp(60px, 9vw, 90px);
    border:none;
    border-radius:clamp(18px, 3vw, 32px);
    background:#ffd500;
    font-family:'Figtree', sans-serif;
    font-size:clamp(14px, 2.4vw, 26px);
    font-weight:800;
    cursor:pointer;
    box-shadow:clamp(6px,1.2vw,12px) clamp(6px,1.2vw,12px) 0 #000;
    transition:.2s;
}
.title-btn:hover{ transform:translateY(-3px); }

/* =====================================================
ROWS & PANELS
===================================================== */

.row{
    display:flex;
    gap:clamp(12px, 2.5vw, 28px);
    margin-bottom:clamp(12px, 2.5vw, 28px);
    flex-wrap:wrap;
}

.panel{
    position:relative;
    background:#f7f5f2;
    border:3px solid #111;
    border-radius:4px;
    padding:clamp(56px, 8vw, 80px) clamp(14px, 2.5vw, 30px) clamp(16px, 2.5vw, 30px);
}

/* section label tabs */
.section-label{
    position:absolute;
    top:-22px;
    left:14px;
    padding:10px 24px;
    border-radius:999px;
    font-size:clamp(13px, 1.8vw, 20px);
    background:#ff6b3d;
    border:2px solid #111;
    white-space:nowrap;
}
.blue-label   { background:#2dc6ff; }
.pink-label   { background:#e78bb8; }
.purple-label { background:#b6a0ef; }
.green-label  { background:#4bc95f; }

/* =====================================================
COLUMN SIZES — fluid, stack on small screens
===================================================== */

.left-col,
.right-col{
    flex:1 1 300px;
    min-width:0;
}

.variables,
.observations{
    flex:1 1 300px;
    min-width:0;
    min-height:clamp(200px, 28vw, 320px);
}

.bottom-panel{
    width:100%;
    padding-top:clamp(56px, 8vw, 90px);
}

/* =====================================================
SHAPES
===================================================== */

.shape-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:clamp(14px, 3vw, 35px);
    flex-wrap:wrap;
}

.shape-btn{
    border:none;
    cursor:pointer;
    font-family:'Figtree', sans-serif;
    font-weight:800;
    transition:.2s;
    color:#111;
}
.shape-btn:hover{ transform:scale(1.04); }

.orange-shape,
.purple-shape{
    width:clamp(140px, 20vw, 220px);
    height:clamp(80px, 11vw, 120px);
    border-radius:clamp(12px, 2vw, 20px);
    font-size:clamp(13px, 1.7vw, 18px);
    line-height:1.3;
    padding:clamp(12px, 1.8vw, 20px);
}
.orange-shape{ background:#ff6b3d; }
.purple-shape{ background:#4d37ff; color:white; }

.variable-shape{
    width:clamp(140px, 20vw, 220px);
    height:clamp(64px, 8vw, 90px);
    background:#b6a0ef;
    border-radius:clamp(12px, 2vw, 20px);
    font-size:clamp(13px, 1.8vw, 20px);
    padding:clamp(12px, 1.8vw, 20px);
}

.hexagon{
    width:clamp(140px, 20vw, 220px);
    height:clamp(80px, 11vw, 120px);
    background:#ea93bc;
    border-radius:clamp(12px, 2vw, 20px);
    font-size:clamp(13px, 1.8vw, 20px);
    padding:clamp(12px, 1.8vw, 20px);
}

.green-hex,
.green-circle{
    width:clamp(140px, 20vw, 220px);
    height:clamp(80px, 11vw, 120px);
    background:#08c56f;
    border-radius:clamp(12px, 2vw, 20px);
    font-size:clamp(12px, 1.6vw, 18px);
    padding:clamp(12px, 1.8vw, 20px);
}

/* =====================================================
IMAGE MODAL
===================================================== */

.modal{
    display:none;
    position:fixed;
    z-index:9999;
    inset:0;
    background:rgba(0,0,0,.7);
}
.modal-content{
    position:relative;
    width:90%;
    height:88%;
    background:white;
    margin:3% auto;
    border-radius:18px;
    overflow:hidden;
}
.close{
    position:absolute;
    right:16px;
    top:8px;
    z-index:10;
    font-size:clamp(30px, 4vw, 40px);
    cursor:pointer;
    font-weight:700;
}
iframe{ width:100%; height:100%; border:none; }
#popup-image{
    width:100%;
    height:100%;
    object-fit:contain;
    display:none;
    background:#fff;
}

/* =====================================================
SLIDESHOW MODAL
===================================================== */

#slideshow-modal{
    display:none;
    position:fixed;
    z-index:9999;
    inset:0;
    background:rgba(0,0,0,.75);
}
.slideshow-content{
    position:relative;
    width:92%;
    max-width:900px;
    height:90%;
    background:#fff;
    margin:3% auto;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}
.slideshow-close{
    position:absolute;
    right:14px;
    top:8px;
    z-index:10;
    font-size:clamp(30px, 4vw, 40px);
    cursor:pointer;
    font-weight:700;
    line-height:1;
    color:#111;
    background:none;
    border:none;
}
.slideshow-img-wrap{
    flex:1;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px clamp(52px, 8vw, 70px);
    overflow:hidden;
}
.slideshow-img-wrap img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    border-radius:8px;
}

/* arrows */
.slide-arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:#ffd500;
    border:2px solid #111;
    border-radius:50%;
    width:clamp(36px, 5vw, 48px);
    height:clamp(36px, 5vw, 48px);
    font-size:clamp(16px, 2.2vw, 22px);
    font-weight:800;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:3px 3px 0 #111;
    transition:.15s;
    z-index:5;
}
.slide-arrow:hover{ transform:translateY(-50%) scale(1.1); }
.slide-arrow.prev{ left:10px; }
.slide-arrow.next{ right:10px; }
.slide-arrow:disabled{ opacity:.3; cursor:default; }
.slide-arrow:disabled:hover{ transform:translateY(-50%) scale(1); }

/* dots */
.slide-dots{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:12px 20px 18px;
}
.dot{
    width:clamp(10px, 1.4vw, 12px);
    height:clamp(10px, 1.4vw, 12px);
    border-radius:50%;
    background:#ccc;
    border:2px solid #111;
    cursor:pointer;
    transition:.15s;
}
.dot.active{ background:#ffd500; }

.slide-counter{
    text-align:center;
    font-size:clamp(11px, 1.3vw, 13px);
    font-weight:600;
    color:#666;
    padding-bottom:2px;
}

/* =====================================================
TIMER
===================================================== */

#slide-timer{
    display:none;
    flex-direction:row;
    align-items:center;
    justify-content:center;
    gap:20px;
    padding:10px 20px 6px;
    flex-shrink:0;
}

/* when timer is visible, shrink the image area so timer gets real space */
#slideshow-modal.timer-visible .slideshow-content{
    justify-content:center;
}
#slideshow-modal.timer-visible .slideshow-img-wrap{
    flex:0 0 auto;
    height:52%;
}

#timer-display{
    font-size:clamp(36px, 6vw, 56px);
    font-weight:800;
    font-variant-numeric:tabular-nums;
    letter-spacing:.06em;
    color:#111;
    min-width:120px;
    text-align:center;
    line-height:1;
}

#timer-display.urgent{
    color:#e03030;
    animation:pulse .8s ease-in-out infinite;
}

@keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.06); }
}

#timer-btn{
    background:#ffd500;
    border:2px solid #111;
    border-radius:14px;
    font-family:'Figtree', sans-serif;
    font-size:clamp(16px, 2vw, 22px);
    font-weight:800;
    padding:12px 28px;
    cursor:pointer;
    box-shadow:4px 4px 0 #111;
    transition:.15s;
}
#timer-btn:hover{
    background:#ffe94d;
    transform:translateY(-2px);
}
#timer-btn.reset-mode{
    background:#f7f5f2;
}

/* =====================================================
UTILITY
===================================================== */

.center{
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* =====================================================
TABLET BREAKPOINT (iPads, Chromebooks ~768–1024px)
===================================================== */

@media (max-width: 860px){
    .row{ flex-direction:column; }
    .left-col,.right-col,.variables,.observations{
        flex:none;
        width:100%;
        min-height:unset;
    }
}

/* =====================================================
SMALL / MOBILE BREAKPOINT
===================================================== */

@media (max-width: 540px){
    .sidebar-tab{ font-size:11px; padding:14px 8px; }
    .shape-btn{ font-size:12px; }
    .section-label{ font-size:12px; padding:8px 16px; top:-18px; }
}

</style>
</head>
<body>

<!-- LOGO -->
<button class="logo-btn" onclick="window.open('https://www.gtac.edu.au','_blank')">
    <img src="gtac_primary_onyx.png" alt="GTAC logo">
</button>

<!-- INSTRUCTIONS SIDEBAR -->
<div class="sidebar" id="sidebar">

    <div class="sidebar-drawer">
        <button class="sidebar-btn"
        onclick="openSlideshow(['Instructions - Design 1.png','Instructions - Design 2.png','Instructions - Design 3.png','Instructions - Design 4.png'])">
            How to design your experiment
        </button>
        <button class="sidebar-btn"
        onclick="openSlideshow(['Instructions - Boson 1.png','Instructions - Boson 2.png','Instructions - Boson 3.png'])">
            How to use the Boson kit
        </button>
        <button class="sidebar-btn"
        onclick="openSlideshow(['Instructions - Poster 1.png'])">
            How to complete your poster
        </button>
    </div>

    <button class="sidebar-tab" onclick="toggleSidebar()">
        <span class="tab-arrow">&#8592;</span>
        INSTRUCTIONS
    </button>

</div>

<!-- POSTER -->
<div class="poster">

    <!-- TITLE -->
    <div class="title-wrapper">
        <button class="title-btn" onclick="openImageModal('Student - Question.png')">
            WRITE AN INVESTIGATION QUESTION
        </button>
    </div>

    <!-- TOP ROW -->
    <div class="row">

        <div class="panel left-col">
            <div class="section-label">Background information</div>
            <div class="shape-wrap">
                <button class="shape-btn orange-shape center"
                onclick="openImageModal('Student - Writing an Introduction.png')">
                    WRITING AN<br>INTRODUCTION
                </button>
                <button class="shape-btn orange-shape center"
                onclick="openImageModal('Student - Writing a Prediction.png')">
                    MAKING A<br>PREDICTION
                </button>
            </div>
        </div>

        <div class="panel right-col">
            <div class="section-label blue-label">Tables and Graphs</div>
            <div class="shape-wrap">
                <button class="shape-btn purple-shape center"
                onclick="openImageModal('Student - Constructing Tables.png')">
                    CONSTRUCTING<br>TABLES
                </button>
                <button class="shape-btn purple-shape center"
                onclick="openImageModal('Student - Constructing Graphs.png')">
                    CONSTRUCTING<br>GRAPHS
                </button>
            </div>
        </div>

    </div>

    <!-- MIDDLE ROW -->
    <div class="row">

        <div class="panel variables">
            <div class="section-label purple-label">Experimental design</div>
            <div class="shape-wrap">
                <button class="shape-btn variable-shape center"
                onclick="openImageModal('Student - Draw a Diagram.png')">
                    DRAW A<br>DIAGRAM
                </button>
                <button class="shape-btn variable-shape center"
                onclick="openImageModal('Student - Variables.png')">
                    WHAT ARE<br>VARIABLES?
                </button>
            </div>
        </div>

        <div class="panel observations">
            <div class="section-label pink-label">Our observations</div>
            <div class="shape-wrap">
                <button class="shape-btn hexagon center"
                onclick="openImageModal('Student - How to Summarise Results.png')">
                    HOW TO<br>SUMMARISE<br>RESULTS
                </button>
            </div>
        </div>

    </div>

    <!-- BOTTOM -->
    <div class="panel bottom-panel">
        <div class="section-label green-label">What we learned from further research:</div>
        <div class="shape-wrap">
            <button class="shape-btn green-hex center"
            onclick="openImageModal('Student - How to Research.png')">
                HOW TO<br>RESEARCH
            </button>
            <button class="shape-btn green-circle center"
            onclick="openImageModal('Student - Connecting Research.png')">
                CONNECTING<br>RESEARCH
            </button>
            <button class="shape-btn green-hex center"
            onclick="openImageModal('Student - What Next.png')">
                WHAT<br>NEXT?
            </button>
        </div>
    </div>

</div>

<!-- IMAGE MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <iframe id="popup-frame"></iframe>
        <img id="popup-image" alt="">
    </div>
</div>

<!-- SLIDESHOW MODAL -->
<div id="slideshow-modal">
    <div class="slideshow-content">
        <button class="slideshow-close" onclick="closeSlideshow()">&times;</button>
        <div class="slideshow-img-wrap">
            <button class="slide-arrow prev" id="prev-btn" onclick="changeSlide(-1)">&#8592;</button>
            <img id="slide-img" src="" alt="Instruction slide">
            <button class="slide-arrow next" id="next-btn" onclick="changeSlide(1)">&#8594;</button>
        </div>
        <div class="slide-counter" id="slide-counter"></div>

        <!-- 5-MIN TIMER (visible only on Design slide 3) -->
        <div id="slide-timer">
            <div id="timer-display">5:00</div>
            <button id="timer-btn" onclick="timerToggle()">▶ Start</button>
        </div>

        <div class="slide-dots" id="slide-dots"></div>
    </div>
</div>

<script>

/* SIDEBAR */
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("open");
}

/* SINGLE IMAGE MODAL */
function openModal(page){
    document.getElementById("modal").style.display = "block";
    document.getElementById("popup-frame").style.display = "block";
    document.getElementById("popup-frame").src = page;
    document.getElementById("popup-image").style.display = "none";
    document.getElementById("popup-image").src = "";
}
function openImageModal(imageSrc){
    document.getElementById("modal").style.display = "block";
    document.getElementById("popup-image").style.display = "block";
    document.getElementById("popup-image").src = imageSrc;
    document.getElementById("popup-frame").style.display = "none";
    document.getElementById("popup-frame").src = "";
}
function closeModal(){
    document.getElementById("modal").style.display = "none";
    document.getElementById("popup-frame").src = "";
    document.getElementById("popup-image").src = "";
}

window.onclick = function(e){
    if(e.target == document.getElementById("modal")) closeModal();
    if(e.target == document.getElementById("slideshow-modal")) closeSlideshow();
}

/* SLIDESHOW */
let slideImages = [];
let currentSlide = 0;

function openSlideshow(images){
    slideImages = images;
    currentSlide = 0;
    buildDots();
    renderSlide();
    document.getElementById("slideshow-modal").style.display = "block";
}
function closeSlideshow(){
    document.getElementById("slideshow-modal").style.display = "none";
    document.getElementById("slideshow-modal").classList.remove("timer-visible");
    document.getElementById("slide-img").src = "";
    slideImages = [];
    timerReset();
}
function changeSlide(dir){
    currentSlide = Math.max(0, Math.min(slideImages.length - 1, currentSlide + dir));
    renderSlide();
}
function goToSlide(i){
    currentSlide = i;
    renderSlide();
}
function renderSlide(){
    document.getElementById("slide-img").src = slideImages[currentSlide];
    document.getElementById("slide-counter").textContent = (currentSlide + 1) + " / " + slideImages.length;
    document.getElementById("prev-btn").disabled = currentSlide === 0;
    document.getElementById("next-btn").disabled = currentSlide === slideImages.length - 1;
    document.querySelectorAll(".dot").forEach((d,i) => d.classList.toggle("active", i === currentSlide));

    /* show timer only on Design slideshow, slide index 2 (3rd slide) */
    const isDesignSlideshow = slideImages[0] && slideImages[0].startsWith("Instructions - Design");
    const timerEl = document.getElementById("slide-timer");
    const modal = document.getElementById("slideshow-modal");
    if(isDesignSlideshow && currentSlide === 2){
        timerEl.style.display = "flex";
        modal.classList.add("timer-visible");
    } else {
        timerEl.style.display = "none";
        modal.classList.remove("timer-visible");
        timerReset();
    }
}
function buildDots(){
    const c = document.getElementById("slide-dots");
    c.innerHTML = "";
    slideImages.forEach((_,i) => {
        const d = document.createElement("button");
        d.className = "dot" + (i===0 ? " active" : "");
        d.setAttribute("aria-label","Go to slide "+(i+1));
        d.onclick = () => goToSlide(i);
        c.appendChild(d);
    });
}

/* KEYBOARD */
document.addEventListener("keydown", function(e){
    if(document.getElementById("slideshow-modal").style.display === "block"){
        if(e.key==="ArrowLeft") changeSlide(-1);
        if(e.key==="ArrowRight") changeSlide(1);
        if(e.key==="Escape") closeSlideshow();
    }
    if(document.getElementById("modal").style.display === "block"){
        if(e.key==="Escape") closeModal();
    }
});

/* TOUCH SWIPE for slideshow */
let touchStartX = 0;
document.getElementById("slideshow-modal").addEventListener("touchstart", e => {
    touchStartX = e.changedTouches[0].screenX;
}, { passive: true });
document.getElementById("slideshow-modal").addEventListener("touchend", e => {
    const diff = touchStartX - e.changedTouches[0].screenX;
    if(Math.abs(diff) > 40) changeSlide(diff > 0 ? 1 : -1);
});

/* =====================================================
5-MINUTE TIMER
===================================================== */

const TIMER_DURATION = 5 * 60; /* seconds */
let timerSeconds = TIMER_DURATION;
let timerInterval = null;
let timerRunning = false;

function timerToggle(){
    if(timerRunning){
        /* pause */
        clearInterval(timerInterval);
        timerInterval = null;
        timerRunning = false;
        document.getElementById("timer-btn").textContent = "▶ Resume";
        document.getElementById("timer-btn").classList.remove("reset-mode");
    } else if(timerSeconds === 0){
        /* finished — reset on click */
        timerReset();
    } else {
        /* start / resume */
        timerRunning = true;
        document.getElementById("timer-btn").textContent = "⏸ Pause";
        document.getElementById("timer-btn").classList.remove("reset-mode");
        timerInterval = setInterval(function(){
            timerSeconds--;
            timerRender();
            if(timerSeconds <= 0){
                clearInterval(timerInterval);
                timerInterval = null;
                timerRunning = false;
                document.getElementById("timer-btn").textContent = "↺ Reset";
                document.getElementById("timer-btn").classList.add("reset-mode");
            }
        }, 1000);
    }
}

function timerReset(){
    clearInterval(timerInterval);
    timerInterval = null;
    timerRunning = false;
    timerSeconds = TIMER_DURATION;
    timerRender();
    const btn = document.getElementById("timer-btn");
    btn.textContent = "▶ Start";
    btn.classList.remove("reset-mode");
}

function timerRender(){
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    document.getElementById("timer-display").textContent =
        m + ":" + String(s).padStart(2,"0");
    /* go red in last 60 seconds */
    document.getElementById("timer-display").classList.toggle("urgent", timerSeconds <= 60 && timerSeconds > 0);
}

</script>
</body>
</html>
